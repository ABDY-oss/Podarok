<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Цветочная энциклопедия • Вход</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="flower flower1">🌸</div>
    <div class="flower flower2">🌼</div>
    <div class="flower flower3">🌷</div>
    <div class="flower flower4">🌺</div>
    <div class="flower flower5">🌹</div>

    <div class="login-container">
        <div class="login-card">
            <h1>🌸 Цветочная энциклопедия девочек 10И класса 🌸</h1>
            <p class="subtitle">Войди, чтобы найти страницу о себе</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Электронная почта:</label>
                    <input type="email" id="email" placeholder="Введите почту" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Пароль:</label>
                    <input type="password" id="password" placeholder="Введите пароль" required>
                </div>
                
                <button type="submit" class="login-btn">🌸 Войти на сайт</button>
            </form>
            
            <div id="errorMessage" class="error-message"></div>
            
            <div class="flower-decoration">
                <span>🌼</span> <span>🌻</span> <span>🌸</span> <span>🌺</span> <span>🌷</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
